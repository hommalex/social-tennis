<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTC Social Tennis</title>
    
    <link rel="stylesheet" href="./assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/css/mystyle.css">

    <script src="./assets/js/vue3.js"></script>
    
    <script src="./components/TabSelection.js"></script>
    <script src="./components/TabGames.js"></script>
    <script src="./components/TabResult.js"></script>
    <script src="./components/TournamentTeams.js?v=3"></script>
    <script src="./components/TournamentGames.js"></script>
    <script src="./components/TournamentResult.js"></script>

</head>
<body>

<div id="app">
 <!-- -->
    <div v-if="isLoading" class="loading-overlay">
		  <div class="navan-spinner-container">
			<svg class="navan-spinner-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
			  
			  <defs>
				<path id="circleTop" d="M 8,50 A 42,42 0 0,1 92,50" /> 
				<path id="circleBot" d="M 8,50 A 42,42 0 0,0 92,50" />
			  </defs>

			  <g transform="translate(50, 50) scale(0.75) translate(-50, -50)"> 
				
				<g transform="rotate(45, 50, 50)">
				  <ellipse cx="50" cy="20" rx="12" ry="16" class="navan-racket" stroke-width="3" />
				  <line x1="50" y1="36" x2="50" y2="75" class="navan-racket" stroke-width="3" />
				  <line x1="44" y1="12" x2="44" y2="28" class="navan-racket" stroke-width="0.5" />
				  <line x1="56" y1="12" x2="56" y2="28" class="navan-racket" stroke-width="0.5" />
				  <line x1="40" y1="20" x2="60" y2="20" class="navan-racket" stroke-width="0.5" />
				</g>
				
				<g transform="rotate(-45, 50, 50)">
				  <ellipse cx="50" cy="20" rx="12" ry="16" class="navan-racket" stroke-width="3" />
				  <line x1="50" y1="36" x2="50" y2="75" class="navan-racket" stroke-width="3" />
				  <line x1="44" y1="12" x2="44" y2="28" class="navan-racket" stroke-width="0.5" />
				  <line x1="56" y1="12" x2="56" y2="28" class="navan-racket" stroke-width="0.5" />
				  <line x1="40" y1="20" x2="60" y2="20" class="navan-racket" stroke-width="0.5" />
				</g>

				<circle cx="50" cy="30" r="3" fill="#005826" />
			  </g>

			  <text class="navan-text">
				<textPath xlink:href="#circleTop" startOffset="50%" text-anchor="middle">
				  NAVAN
				</textPath>
			  </text>
			  
			  <text class="navan-text">
				<textPath xlink:href="#circleBot" startOffset="50%" text-anchor="middle">
				  TENNIS CLUB
				</textPath>
			  </text>

			</svg>
		  </div>
	
    </div>

    <!-- Bottom Saving Indicator -->
    <div v-if="isSaving" class="saving-bar">
        <div class="saving-bar-inner bg-danger">
            <div class="spinner-border spinner-border-sm text-white me-2" role="status"></div>
            <span>Saving... DO NOT IDLE YOUR DEVICE</span> 
        </div>
    </div>

    <!-- Side Menu Backdrop -->
    <div v-if="sideMenuOpen" class="side-menu-backdrop" @click="sideMenuOpen = false"></div>

    <!-- Side Menu Panel -->
    <div class="side-menu" :class="{ open: sideMenuOpen }">
        <div class="p-3 bg-primary text-white d-flex justify-content-between align-items-center">
            <strong><i class="bi bi-grid-3x3-gap me-2"></i>NTC Events</strong>
            <button class="btn btn-sm btn-close btn-close-white" @click="sideMenuOpen = false"></button>
        </div>
        <div class="p-3 d-grid gap-3">
            <button class="btn btn-lg text-start px-3"
                    :class="appMode === 'social' ? 'btn-primary' : 'btn-outline-primary'"
                    @click="switchMode('social')">
                <i class="bi bi-calendar-week fs-4 me-3"></i>
                <span>
                    <strong class="d-block">Social Tuesday</strong>
                    <small class="text-muted" style="font-size:0.75rem">Individual event</small>
                </span>
            </button>
            <button class="btn btn-lg text-start px-3"
                    :class="appMode === 'tournament' ? 'btn-success' : 'btn-outline-success'"
                    @click="switchMode('tournament')">
                <i class="bi bi-trophy fs-4 me-3"></i>
                <span>
                    <strong class="d-block">Team Tournament</strong>
                    <small class="text-muted" style="font-size:0.75rem">Team event · 3 rounds</small>
                </span>
            </button>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4"
         :class="appMode === 'social' ? 'bg-primary' : 'bg-success'">
        <div class="container-fluid">
            <div class="d-flex align-items-center">
                <button class="btn btn-sm btn-outline-light me-2" @click="sideMenuOpen = true">
                    <i class="bi bi-grid-3x3-gap"></i>
                </button>
                <a class="navbar-brand mb-0" href="#">
                    <img src="./assets/images/NavanLogo.png" style="height: 32px" alt="logo" class="me-2" />
                    <span v-if="appMode === 'social'">NTC Social Tennis</span>
                    <span v-else>NTC Team Tournament</span>
                </a>
            </div>
            <div class="d-flex">
                <button class="btn btn-sm btn-outline-light" v-if="appMode === 'social'" @click="infoModal = true">
                    <i class="bi bi-info-circle"></i> Information
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <ul class="nav nav-tabs mb-4">
            <li class="nav-item" v-for="(tab, index) in tabs" :key="index">
                <a class="nav-link"
                   :class="[{ active: currentTab === tab.component }, appMode === 'tournament' ? 'text-success' : '']"
                   href="#" @click.prevent="currentTab = tab.component">
                    {{ tab.name }}
                </a>
            </li>
        </ul>

        <div class="card mb-3" :class="appMode === 'social' ? 'border-primary' : 'border-success'">
            <div class="card-body">
                <transition name="fade" mode="out-in">

                    <!-- Social Tuesday Components -->
                    <component v-if="appMode === 'social'"
                        :key="'social-' + currentTab"
                        :is="currentTab"
                        :data="jsonData"
                        :selected="socialSelectedPlayers"
                        :dialog="dialog"
                        @update-selected="updateSelectedPlayers"
                        @save-new-player="saveNewPlayer"
                        @edit-player="handleEditPlayer"
                        @update-games="saveGames"
                        @substitute-player="handleSubstitutePlayer"
                        @finalize-session="handleFinalizeSession"
                        @delete-player="handleDeletePlayer"
                    ></component>

                    <!-- Tournament Components -->
                    <component v-else
                        :key="'tournament-' + currentTab"
                        :is="currentTab"
                        :data="tournamentData"
                        :selected="tournamentSelectedPlayers"
                        :dialog="dialog"
                        @update-selected="updateSelectedPlayers"
                        @save-new-player="saveNewPlayer"
                        @edit-player="handleEditPlayer"
                        @substitute-player="handleSubstitutePlayer"
                        @finalize-session="handleFinalizeSession"
                        @delete-player="handleDeletePlayer"
                        @update-tournament-teams="saveTournamentTeams"
                        @update-tournament-games="saveTournamentGames"
                        @update-tournament-ghosts="saveTournamentGhosts"
                        @regen-games="handleRegenGames"
                    ></component>

                </transition>
            </div>
        </div>
    </div>
	
	<div class="footer">
		@{{ thisYear }} - Navan Tennis Club
	</div>
			
	<div v-if="modalState.show" class="modal custom-modal-backdrop">
		<div class="modal-dialog">
			<div class="modal-content shadow">
				<div class="modal-header" :class="modalState.type === 'confirm' ? 'bg-warning text-dark' : 'bg-primary text-white'">
					<h5 class="modal-title">{{ modalState.title }}</h5>
					<button type="button" class="btn-close" @click="resolveModal(false)"></button>
				</div>
				<div class="modal-body">
					<p class="fs-6">{{ modalState.message }}</p>
				</div>
				<div class="modal-footer">
					<button v-if="modalState.type === 'confirm'" type="button" class="btn btn-secondary" @click="resolveModal(false)">Cancel</button>
					<button type="button" class="btn" :class="modalState.type === 'confirm' ? 'btn-warning' : 'btn-primary'" @click="resolveModal(true)">
						{{ modalState.type === 'confirm' ? 'Confirm' : 'OK' }}
					</button>
				</div>
			</div>
		</div>
	</div>
	<div v-if="infoModal" class="modal custom-modal-backdrop">
		<div class="modal-dialog modal-dialog-scrollable">
			<div class="modal-content">
					<div class="modal-header bg-primary text-white">
					<h5 class="modal-title"> <i class="bi bi-info-circle"></i> Information</h5>
					<button type="button" class="btn-close" @click="infoModal = false"></button>
				</div>
				<div class="modal-body">
					<img src="./assets/images/tennis-information.jpg" alt="Game Information" style="width: 100%;" />
				</div>
			</div>
		</div>
	</div>
</div>

<script>
    const { createApp, ref, computed, reactive, onMounted } = Vue;

    const API_CONFIG = {
		type: 'bin',
		endpoint: 'https://api.jsonbin.io/v3/b/',
		addOn: '/latest',
        binId: '6970c321d0ea881f407a7bab',
        apiKey: '$2a$10$8czTg3UoYIs/26B9Scbo3OkkGrZz4ZZwfrNUl./r65HzhLfzw2YU2'
    };
    /*const API_CONFIG = {
		type: 'keeper',
		endpoint: 'https://www.jsonkeeper.com/b/GMREB',
		addOn: '',
        binId: '',
        apiKey: ''
    };
    const API_CONFIG = {
		type: 'npoint',
		endpoint: 'https://api.npoint.io/12551ba002f3a3cd1f2c',
		addOn: '',
        binId: '',
        apiKey: ''
    };*/

    createApp({
        components: {
            'tab-selection': TabSelection,
            'tab-games': TabGames,
            'tab-result': TabResult,
            'tournament-teams': TournamentTeams,
            'tournament-games': TournamentGames,
            'tournament-result': TournamentResult
        },
        setup() {
            const appMode = ref('social'); // 'social' | 'tournament'
            const sideMenuOpen = ref(false);
            const currentTab = ref('tab-selection');
            const isLoading = ref(false);
            const isSaving = ref(false);
            const infoModal = ref(false);

            // --- Debounced Save ---
            let debounceTimer = null;
            let pendingSnapshot = null;

            const jsonData = ref({
                last_update: "",
                current: { numOfRounds: 3, list: [], games: [] },
                tournament: { list: [], teams: [], games: [] },
                players: []
            });

            const thisYear = new Date().getFullYear();

            const socialSelectedPlayers = ref([]);
            const tournamentSelectedPlayers = ref([]);

            const socialTabs = [
                { name: 'Players', component: 'tab-selection' },
                { name: 'Matches', component: 'tab-games' },
                { name: 'Result', component: 'tab-result' }
            ];

            const tournamentTabs = [
                { name: 'Players', component: 'tab-selection' },
                { name: 'Teams', component: 'tournament-teams' },
                { name: 'Matches', component: 'tournament-games' },
                { name: 'Result', component: 'tournament-result' }
            ];

            const tabs = computed(() => appMode.value === 'social' ? socialTabs : tournamentTabs);

            // For tournament mode: expose tournament.games as current.games so TabSelection
            // active-player detection works correctly
            const tournamentData = computed(() => {
                const t = jsonData.value.tournament || { list: [], teams: [], games: [] };
                return {
                    ...jsonData.value,
                    current: {
                        games: t.games || [],
                        list: t.list || [],
                        numOfRounds: 3,
                        gamesPerMatch: 7
                    },
                    tournament: t
                };
            });

            const switchMode = (mode) => {
                appMode.value = mode;
                currentTab.value = 'tab-selection';
                sideMenuOpen.value = false;
            };

            // --- MODAL LOGIC ---
            const modalState = reactive({
                show: false,
                title: '',
                message: '',
                type: 'alert',
                resolve: null
            });

            const dialog = {
                alert: (title, message) => {
                    return new Promise((resolve) => {
                        modalState.title = title;
                        modalState.message = message;
                        modalState.type = 'alert';
                        modalState.show = true;
                        modalState.resolve = resolve;
                    });
                },
                confirm: (title, message) => {
                    return new Promise((resolve) => {
                        modalState.title = title;
                        modalState.message = message;
                        modalState.type = 'confirm';
                        modalState.show = true;
                        modalState.resolve = resolve;
                    });
                }
            };

            const resolveModal = (result) => {
                modalState.show = false;
                if (modalState.resolve) {
                    modalState.resolve(result);
                    modalState.resolve = null;
                }
            };

            const fetchData = async () => {
                isLoading.value = true;
                try {
                    const response = await fetch(`${API_CONFIG.endpoint}${API_CONFIG.binId}${API_CONFIG.addOn}`, {
                        method: 'GET',
                        headers: { 'X-Master-Key': API_CONFIG.apiKey }
                    });
                    const result = await response.json();

					if (API_CONFIG.type === 'bin') {
						jsonData.value = result.record;
					} else {
						jsonData.value = result
					}
                    

                    // Ensure tournament structure exists
                    if (!jsonData.value.tournament) {
                        jsonData.value.tournament = { list: [], teams: [], games: [] };
                    }

                    // Populate social selected players
                    if (jsonData.value.current && Array.isArray(jsonData.value.current.list)) {
                        const currentIds = jsonData.value.current.list;
                        socialSelectedPlayers.value = jsonData.value.players.filter(p => currentIds.includes(p.id));
                    }

                    // Populate tournament selected players
                    if (jsonData.value.tournament && Array.isArray(jsonData.value.tournament.list)) {
                        const tIds = jsonData.value.tournament.list;
                        tournamentSelectedPlayers.value = jsonData.value.players.filter(p => tIds.includes(p.id));
                    }
                } catch (error) {
                    console.error("Error fetching data:", error);
                    alert("Error loading data from JSONBin.");
                } finally {
                    isLoading.value = false;
                }
            };

            const saveNewPlayer = async (newPlayerObj) => {
                jsonData.value.players.push(newPlayerObj);
                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const updateSelectedPlayers = async (newList) => {
                if (appMode.value === 'social') {
                    socialSelectedPlayers.value = newList;
                    jsonData.value.current.list = newList.map(p => p.id);
                } else {
                    tournamentSelectedPlayers.value = newList;
                    if (!jsonData.value.tournament) jsonData.value.tournament = { list: [], teams: [], games: [] };
                    jsonData.value.tournament.list = newList.map(p => p.id);
                }
                syncToCloud();
            };

            const handleEditPlayer = async (updatedInfo) => {
                // 1. Update Master List
                const playerIndex = jsonData.value.players.findIndex(p => p.id === updatedInfo.id);
                if (playerIndex !== -1) {
                    jsonData.value.players[playerIndex].name = updatedInfo.name;
                    jsonData.value.players[playerIndex].gender = updatedInfo.gender;
                    if (updatedInfo.level) jsonData.value.players[playerIndex].level = updatedInfo.level;
                }

                // 2. Update both selected lists
                [socialSelectedPlayers.value, tournamentSelectedPlayers.value].forEach(list => {
                    const idx = list.findIndex(p => p.id === updatedInfo.id);
                    if (idx !== -1) {
                        list[idx].name = updatedInfo.name;
                        list[idx].gender = updatedInfo.gender;
                        if (updatedInfo.level) list[idx].level = updatedInfo.level;
                    }
                });

                // 3. Deep update social games
                if (jsonData.value.current && jsonData.value.current.games) {
                    jsonData.value.current.games.forEach(round => {
                        if (round.games) {
                            round.games.forEach(game => {
                                const u = (p) => { if (p && p.id === updatedInfo.id) { p.name = updatedInfo.name; p.gender = updatedInfo.gender; } };
                                u(game.pairA.p1); u(game.pairA.p2); u(game.pairB.p1); u(game.pairB.p2);
                            });
                        }
                        if (round.sitOuts) {
                            round.sitOuts.forEach(p => { if (p.id === updatedInfo.id) { p.name = updatedInfo.name; p.gender = updatedInfo.gender; } });
                        }
                    });
                }

                // 4. Deep update tournament games
                if (jsonData.value.tournament && jsonData.value.tournament.games) {
                    jsonData.value.tournament.games.forEach(round => {
                        if (round.games) {
                            round.games.forEach(game => {
                                const u = (p) => { if (p && p.id === updatedInfo.id) { p.name = updatedInfo.name; p.gender = updatedInfo.gender; } };
                                u(game.pairA.p1); u(game.pairA.p2); u(game.pairB.p1); u(game.pairB.p2);
                            });
                        }
                    });
                }

                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const handleDeletePlayer = async (playerId) => {
                jsonData.value.players = jsonData.value.players.filter(p => p.id !== playerId);
                socialSelectedPlayers.value = socialSelectedPlayers.value.filter(p => p.id !== playerId);
                tournamentSelectedPlayers.value = tournamentSelectedPlayers.value.filter(p => p.id !== playerId);

                if (jsonData.value.current?.list) {
                    jsonData.value.current.list = jsonData.value.current.list.filter(id => id !== playerId);
                }
                if (jsonData.value.tournament?.list) {
                    jsonData.value.tournament.list = jsonData.value.tournament.list.filter(id => id !== playerId);
                }
                if (jsonData.value.tournament?.teams) {
                    jsonData.value.tournament.teams.forEach(team => {
                        if (team.players) team.players = team.players.filter(id => id !== playerId);
                    });
                }

                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const handleSubstitutePlayer = async ({ oldId, newPlayer }) => {
                if (appMode.value === 'social') {
                    const selIndex = socialSelectedPlayers.value.findIndex(p => p.id === oldId);
                    if (selIndex !== -1) socialSelectedPlayers.value[selIndex] = newPlayer;

                    if (jsonData.value.current?.list) {
                        const listIndex = jsonData.value.current.list.indexOf(oldId);
                        if (listIndex !== -1) jsonData.value.current.list[listIndex] = newPlayer.id;
                    }
                    if (jsonData.value.current?.games) {
                        jsonData.value.current.games.forEach(round => {
                            if (round.games) {
                                round.games.forEach(game => {
                                    const cr = (pair) => { if (pair.p1?.id === oldId) pair.p1 = newPlayer; if (pair.p2?.id === oldId) pair.p2 = newPlayer; };
                                    cr(game.pairA); cr(game.pairB);
                                });
                            }
                            if (round.sitOuts) {
                                const si = round.sitOuts.findIndex(p => p.id === oldId);
                                if (si !== -1) round.sitOuts[si] = newPlayer;
                            }
                        });
                    }
                } else {
                    const tIdx = tournamentSelectedPlayers.value.findIndex(p => p.id === oldId);
                    if (tIdx !== -1) tournamentSelectedPlayers.value[tIdx] = newPlayer;

                    if (jsonData.value.tournament?.list) {
                        const idx = jsonData.value.tournament.list.indexOf(oldId);
                        if (idx !== -1) jsonData.value.tournament.list[idx] = newPlayer.id;
                    }
                    if (jsonData.value.tournament?.teams) {
                        jsonData.value.tournament.teams.forEach(team => {
                            if (team.players) {
                                const idx = team.players.indexOf(oldId);
                                if (idx !== -1) team.players[idx] = newPlayer.id;
                            }
                        });
                    }
                    if (jsonData.value.tournament?.games) {
                        jsonData.value.tournament.games.forEach(round => {
                            if (round.games) {
                                round.games.forEach(game => {
                                    const cr = (pair) => { if (pair.p1?.id === oldId) pair.p1 = newPlayer; if (pair.p2?.id === oldId) pair.p2 = newPlayer; };
                                    cr(game.pairA); cr(game.pairB);
                                });
                            }
                        });
                    }
                    // Warn user that teams/matches may need to be regenerated
                    const hasTeams = (jsonData.value.tournament?.teams || []).length > 0;
                    const hasGames = (jsonData.value.tournament?.games || []).length > 0;
                    if (hasTeams || hasGames) {
                        dialog.alert('Heads Up',
                            'Player substituted. Team balance and match pairings were based on the original player rankings. ' +
                            'Go to the Teams tab to regenerate teams, and the Matches tab to regenerate matches if needed.'
                        );
                    }
                }

                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const handleFinalizeSession = async () => {
                if (appMode.value === 'social') {
                    jsonData.value.current.games = [];
                    jsonData.value.current.list = [];
                    socialSelectedPlayers.value = [];
                } else {
                    if (!jsonData.value.tournament) jsonData.value.tournament = { list: [], teams: [], games: [] };
                    jsonData.value.tournament.games = [];
                    jsonData.value.tournament.list = [];
                    jsonData.value.tournament.teams = [];
                    jsonData.value.tournament.ghosts = [];
                    tournamentSelectedPlayers.value = [];
                }
                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const syncToCloud = () => {
                pendingSnapshot = JSON.stringify(jsonData.value);
                isSaving.value = true;
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(async () => {
                    try {
                        await fetch(`${API_CONFIG.endpoint}${API_CONFIG.binId}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Master-Key': API_CONFIG.apiKey
                            },
                            body: pendingSnapshot
                        });
                    } catch (error) {
                        console.error("Error saving data:", error);
                        alert("Failed to save to cloud.");
                    } finally {
                        isSaving.value = false;
                    }
                }, 5000);
            };

            const saveGames = async (newSchedule) => {
                jsonData.value.current.games = newSchedule;
                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const saveTournamentTeams = async (teams) => {
                if (!jsonData.value.tournament) jsonData.value.tournament = { list: [], teams: [], games: [] };
                jsonData.value.tournament.teams = teams;
                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const saveTournamentGhosts = async (ghosts) => {
                if (!jsonData.value.tournament) jsonData.value.tournament = { list: [], teams: [], games: [], ghosts: [] };
                jsonData.value.tournament.ghosts = ghosts;
                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const saveTournamentGames = async (games) => {
                if (!jsonData.value.tournament) jsonData.value.tournament = { list: [], teams: [], games: [] };
                jsonData.value.tournament.games = games;
                jsonData.value.last_update = new Date().toISOString().split('T')[0];
                syncToCloud();
            };

            const handleRegenGames = () => {
                if (!jsonData.value.tournament) return;
                // Clear games so TournamentGames watcher triggers auto-regeneration
                jsonData.value.tournament.games = [];
            };

            onMounted(() => {
                fetchData();
            });

            return {
                appMode, sideMenuOpen, switchMode,
                currentTab, infoModal, tabs,
                jsonData, tournamentData,
                socialSelectedPlayers, tournamentSelectedPlayers,
                updateSelectedPlayers, saveNewPlayer,
                handleEditPlayer, fetchData,
                handleSubstitutePlayer, handleFinalizeSession, handleDeletePlayer,
                isLoading, isSaving, saveGames,
                saveTournamentTeams, saveTournamentGhosts, saveTournamentGames, handleRegenGames,
                modalState, resolveModal, dialog,
                thisYear
            };
        }
    }).mount('#app');
